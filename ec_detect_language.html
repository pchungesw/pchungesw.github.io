<script type='text/javascript'>

// get browser language
function getBrowserLanguage() {
  if (navigator.languages && navigator.languages.length > 0) {
    return navigator.languages[0]; // preferred language
  }
  return navigator.language || navigator.userLanguage;
}

// Map browser language to Salesforce supported lanaguages

function mapToSalesforceLanguage(browserLang) {
  const langMap = {
    "en": "en_US",
    "en-US": "en_US",
    "en-GB": "en_GB",
    "fr": "fr",
    "fr-FR": "fr",
    "es": "es",
    "es-ES": "es",
    "de": "de",
    "ja": "ja",
    "zh": "zh_CN"
  };

  return langMap[browserLang] || langMap[browserLang.split('-')[0]] || "en_US";
}

//create variables
const browserLang = getBrowserLanguage();
const sfLang = mapToSalesforceLanguage(browserLang);
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = sfLang; // For example, enter 'en' or 'en-US'
			

			window.addEventListener("onEmbeddedMessagingReady", () => {
  				console.log("Received the onEmbeddedMessagingReady event…");

				// Populating a variable with the current URL
				var currentURL = window.location.href;
				
				// Printing the current URL to the console
				console.log("Current URL:", currentURL);
				// Send data to Salesforce
    				embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({"PageURL" : currentURL});

				embeddedservice_bootstrap.prechatAPI.setVisiblePrechatFields({
				    // List the pre-chat field names with the value and whether it's editable in the pre-chat form.
				    "_firstName": {
				      "value": "Peter",
				      "isEditableByEndUser": true
				    },
				    "_lastName": {
				      "value": "Chung",
				      "isEditableByEndUser": true
				    },
				    "_email": {
				      "value": "pchung@salesforce.com",
				      "isEditableByEndUser": true
				    }
				});

  				embeddedservice_bootstrap.autoResponseAPI.setAutoResponseParameters({
    					cartValue: "123",
					country: "ch",
					language_code: "en",
					country_language: "ch-en",
					userName: "pchung@salesforce.com",
  				});
			});
			embeddedservice_bootstrap.settings.devMode = false;
			
			embeddedservice_bootstrap.init(
				'00DB0000000gb6A',
				'Peter_Messaging_for_Web_Demo',
				'https://deevo-demo.my.site.com/ESWPeterMessagingforWe1673924632044',
				{
					scrt2URL: 'https://deevo-demo.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
