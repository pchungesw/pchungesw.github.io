<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, user-scalable=0">
<title>Neat Stuff MIAW Demo - Direct to Agent</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.22.2/assets/styles/salesforce-lightning-design-system.min.css">
<link rel="stylesheet" href="demo-styles.css">
<style>
	@keyframes slideIn {
		from { transform: translateX(400px); opacity: 0; }
		to   { transform: translateX(0);     opacity: 1; }
	}
	@keyframes slideOut {
		from { transform: translateX(0);     opacity: 1; }
		to   { transform: translateX(400px); opacity: 0; }
	}
</style>
</head>
<body class="slds-scope">

<!-- ═══════════════════════════════════════════════════════════════════════
     The Page Settings slide-panel (☰ Menu) is injected entirely by
     esw-page-menu.js via ESWMenu.init() near the bottom of this file.
     To change the panel UI, edit ONLY esw-page-menu.js — changes apply
     to every page that includes it.
════════════════════════════════════════════════════════════════════════ -->

<!-- ── Page body ──────────────────────────────────────────────────────── -->

<div class="page-header">
	<h1 class="slds-text-heading_large">Enhanced Chat v1</h1>
</div>

<div style="max-width: 600px; margin: 2rem auto; text-align: center;">
	<div style="display: flex; gap: 0.5rem; justify-content: center;">
		<input type="text" id="searchInput" placeholder="Search for products..."
		       class="slds-input" style="flex: 1; max-width: 400px;"
		       onkeypress="if(event.key === 'Enter') handleSearch()">
		<button class="slds-button slds-button_neutral" onclick="handleSearch()">Search</button>
	</div>
</div>

<div style="text-align: center; margin-top: 2rem;">
	<button id="startChatBtn" class="slds-button slds-button_brand"
	        onclick="startChat()" style="display: none;">Start Chat</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Page scripts
════════════════════════════════════════════════════════════════════════ -->
<script>
	// ── Default deployment configuration for this page ──────────────────
	// These are the values that will be used unless the user overrides
	// them via the Deployment Settings section in the menu.
	const PAGE_DEPLOY_DEFAULTS = {
		orgId:          '00DWs00000CvEVZ',
		deploymentName: 'MIAW_Direct_to_Service_Rep',
		siteEndpoint:   'https://agentforceweb.demo.my.site.com/ESWMIAWDirecttoService1749749039230',
		scrt2URL:       'https://agentforceweb.demo.my.salesforce-scrt.com'
	};

	// ── Pre-chat field values (kept in sync by ESWMenu) ──────────────────
	let prechatValues = {
		_firstName: { value: 'Peter',                isEditableByEndUser: true },
		_lastName:  { value: 'Chung',                isEditableByEndUser: true },
		_email:     { value: 'pchung@salesforce.com', isEditableByEndUser: true },
		_subject:   { value: 'product question',     isEditableByEndUser: true }
	};

	// ── Utility wrappers ─────────────────────────────────────────────────
	function showToast(message, type) {
		ESWMenu.showToast(message, type);
	}

	function handleSearch() {
		const searchQuery = document.getElementById('searchInput').value;
		if (!searchQuery.trim()) {
			showToast('Please enter a search query', 'info');
			return;
		}
		if (typeof embeddedservice_bootstrap !== 'undefined' && embeddedservice_bootstrap.utilAPI) {
			embeddedservice_bootstrap.utilAPI.setSessionContext({ search: searchQuery })
				.then(function ()  { showToast('Search context set: "' + searchQuery + '"', 'success'); })
				.catch(function () { showToast('Unable to set search context', 'error'); });
		} else {
			showToast('Chat is not ready yet', 'info');
		}
	}

	function startChat() {
		if (typeof embeddedservice_bootstrap !== 'undefined' && embeddedservice_bootstrap.utilAPI) {
			embeddedservice_bootstrap.utilAPI.launchChat()
				.catch(function () { showToast('Unable to start chat', 'error'); });
		} else {
			showToast('Chat is not ready yet', 'info');
		}
	}

	// ── Embedded Messaging init ──────────────────────────────────────────
	// ESWMenu.getDeploymentConfig() returns the user's saved override (if
	// any) or falls back to PAGE_DEPLOY_DEFAULTS.
	function initEmbeddedMessaging() {
		try {
			const deploy = ESWMenu.getDeploymentConfig(PAGE_DEPLOY_DEFAULTS);
			embeddedservice_bootstrap.settings.language = 'en_US';
			embeddedservice_bootstrap.init(
				deploy.orgId,
				deploy.deploymentName,
				deploy.siteEndpoint,
				{ scrt2URL: deploy.scrt2URL }
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	}

	// ── Embedded Messaging event listeners ──────────────────────────────

	window.addEventListener('onEmbeddedMessagingReady', function () {
		ESWMenu.logEvent('onEmbeddedMessagingReady', {});

		if (embeddedservice_bootstrap.prechatAPI) {
			try {
				embeddedservice_bootstrap.prechatAPI.setVisiblePrechatFields(prechatValues);
			} catch (e) { console.error('Error with prechatAPI:', e); }

			try {
				embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({ routingDirection: 'Queue' });
			} catch (e) { console.error('Error setting default routing direction:', e); }
		}

		document.getElementById('startChatBtn').style.display = 'inline-block';
	});

	// Conversation Status
	window.addEventListener('onEmbeddedMessagingConversationStarted', function (e) { ESWMenu.logEvent('onEmbeddedMessagingConversationStarted', e.detail); });
	window.addEventListener('onEmbeddedMessagingConversationOpened',  function (e) { ESWMenu.logEvent('onEmbeddedMessagingConversationOpened',  e.detail); });
	window.addEventListener('onEmbeddedMessagingConversationClosed',  function (e) { ESWMenu.logEvent('onEmbeddedMessagingConversationClosed',  e.detail); });
	window.addEventListener('onEmbeddedMessagingSessionStatusUpdate', function (e) { ESWMenu.logEvent('onEmbeddedMessagingSessionStatusUpdate', e.detail); });

	// Business Hours
	window.addEventListener('onEmbeddedMessagingWithinBusinessHours',  function (e) { ESWMenu.logEvent('onEmbeddedMessagingWithinBusinessHours',  e.detail); });
	window.addEventListener('onEmbeddedMessagingBusinessHoursStarted', function (e) { ESWMenu.logEvent('onEmbeddedMessagingBusinessHoursStarted', e.detail); });
	window.addEventListener('onEmbeddedMessagingBusinessHoursEnded',   function (e) { ESWMenu.logEvent('onEmbeddedMessagingBusinessHoursEnded',   e.detail); });

	// Button & Window
	window.addEventListener('onEmbeddedMessagingButtonCreated',   function (e) { ESWMenu.logEvent('onEmbeddedMessagingButtonCreated',   e.detail); });
	window.addEventListener('onEmbeddedMessagingButtonClicked',   function (e) { ESWMenu.logEvent('onEmbeddedMessagingButtonClicked',   e.detail); });
	window.addEventListener('onEmbeddedMessagingWindowClosed',    function (e) { ESWMenu.logEvent('onEmbeddedMessagingWindowClosed',    e.detail); });
	window.addEventListener('onEmbeddedMessagingWindowMinimized', function (e) { ESWMenu.logEvent('onEmbeddedMessagingWindowMinimized', e.detail); });
	window.addEventListener('onEmbeddedMessagingWindowMaximized', function (e) { ESWMenu.logEvent('onEmbeddedMessagingWindowMaximized', e.detail); });

	// Messages
	window.addEventListener('onEmbeddedMessageSent',        function (e) { ESWMenu.logEvent('onEmbeddedMessageSent',        e.detail); });
	window.addEventListener('onEmbeddedMessageDelivered',   function (e) { ESWMenu.logEvent('onEmbeddedMessageDelivered',   e.detail); });
	window.addEventListener('onEmbeddedMessageRead',        function (e) { ESWMenu.logEvent('onEmbeddedMessageRead',        e.detail); });
	window.addEventListener('onEmbeddedMessageLinkClicked', function (e) { ESWMenu.logEvent('onEmbeddedMessageLinkClicked', e.detail); });

	// Routing & Participants
	window.addEventListener('onEmbeddedMessagingConversationRouted',             function (e) { ESWMenu.logEvent('onEmbeddedMessagingConversationRouted',             e.detail); });
	window.addEventListener('onEmbeddedMessagingConversationParticipantChanged', function (e) { ESWMenu.logEvent('onEmbeddedMessagingConversationParticipantChanged', e.detail); });

	// Bot & Pre-Chat
	window.addEventListener('onEmbeddedMessagingFirstBotMessageSent', function (e) { ESWMenu.logEvent('onEmbeddedMessagingFirstBotMessageSent', e.detail); });
	window.addEventListener('onEmbeddedMessagingPreChatLoaded',       function (e) { ESWMenu.logEvent('onEmbeddedMessagingPreChatLoaded',       e.detail); });
	window.addEventListener('onEmbeddedMessagingPreChatSubmitted',    function (e) { ESWMenu.logEvent('onEmbeddedMessagingPreChatSubmitted',    e.detail); });

	// Invitations
	window.addEventListener('onEmbeddedMessagingInvitationShown',    function (e) { ESWMenu.logEvent('onEmbeddedMessagingInvitationShown',    e.detail); });
	window.addEventListener('onEmbeddedMessagingInvitationAccepted', function (e) { ESWMenu.logEvent('onEmbeddedMessagingInvitationAccepted', e.detail); });
	window.addEventListener('onEmbeddedMessagingInvitationRejected', function (e) { ESWMenu.logEvent('onEmbeddedMessagingInvitationRejected', e.detail); });

	// Verification
	window.addEventListener('onEmbeddedMessagingIdentityTokenExpired', function (e) { ESWMenu.logEvent('onEmbeddedMessagingIdentityTokenExpired', e.detail); });

	// Transcripts
	window.addEventListener('onEmbeddedMessagingTranscriptRequested',            function (e) { ESWMenu.logEvent('onEmbeddedMessagingTranscriptRequested',            e.detail); });
	window.addEventListener('onEmbeddedMessagingTranscriptDownloadSuccessful',   function (e) { ESWMenu.logEvent('onEmbeddedMessagingTranscriptDownloadSuccessful',   e.detail); });
	window.addEventListener('onEmbeddedMessagingTranscriptRequestFailed',        function (e) { ESWMenu.logEvent('onEmbeddedMessagingTranscriptRequestFailed',        e.detail); });
</script>

<!-- ── Shared menu component (must load before bootstrap so that
     ESWMenu.init() has run before initEmbeddedMessaging() is called) ── -->
<script src="esw-page-menu.js"></script>

<script>
	// ── Initialize the Page Settings panel for this specific page ────────
	ESWMenu.init({
		pageTitle: 'Page Settings',
		configDetails: {
			rows: [
				{ label: 'Org Name', value: 'Agentforceweb' },
				{ label: 'Org ID',   value: '00DWs00000CvEVZ' },
				{
					label: 'Embedded Service Name',
					link:  'https://agentforceweb.demo.my.salesforce-setup.com/lightning/setup/EmbeddedServiceDeployments/04IWs000000CeCzMAK/view',
					value: 'MIAW-Direct to Service Rep'
				},
				{
					label:  'Messaging Channel',
					prefix: 'MIAW - Direct to Service Rep',
					links: [
						{ href: 'https://agentforceweb.demo.my.salesforce-setup.com/lightning/setup/LiveMessageSetup/0MjWs000001FdOfKAK/view?lightning__channelType=', text: 'view' },
						{ href: 'https://agentforceweb.demo.my.salesforce-setup.com/lightning/setup/LiveMessageSetup/0MjWs000001FdOfKAK/view?lightning__channelType=EmbeddedMessaging', text: 'edit' }
					]
				},
				{
					label: 'Routing Type',
					link:  'https://agentforceweb.demo.my.salesforce-setup.com/lightning/setup/Flows/page?address=%2F300Ws00000zsj9tIAA%3FretUrl%3D%2Flightning%2Fsetup%2FFlows%2Fhome',
					value: 'Flow - Messaging Session Omni-Flow'
				},
				{
					label: 'Github Page',
					link:  'https://github.com/pchungesw/pchungesw.github.io/blob/main/agentforceweb_d2a.html',
					value: 'click here'
				}
			]
		},
		deploymentSettings: {
			enabled: true,
			defaults: {
				orgId:          '00DWs00000CvEVZ',
				deploymentName: 'MIAW_Direct_to_Service_Rep',
				siteEndpoint:   'https://agentforceweb.demo.my.site.com/ESWMIAWDirecttoService1749749039230',
				scrt2URL:       'https://agentforceweb.demo.my.salesforce-scrt.com'
			}
		},
		prechat:              { enabled: true },
		chatButtonVisibility: { enabled: true },
		hiddenPrechat:        { enabled: true },
		eventLog:             { enabled: true }
	});
</script>

<!-- ── Dynamically load bootstrap.min.js so the URL can be overridden
     by Deployment Settings without hard-coding it in the HTML ─────── -->
<script>
	(function () {
		var s = document.createElement('script');
		s.type = 'text/javascript';
		s.src  = ESWMenu.getBootstrapURL(
			'https://agentforceweb.demo.my.site.com/ESWMIAWDirecttoService1749749039230'
		);
		s.onload = initEmbeddedMessaging;
		document.head.appendChild(s);
	}());
</script>

</body>
</html>
